services:
  dev:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "6007:6007"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  prod:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "8080:80"

volumes:
  node_modules:
